appId: com.datacon.app
productName: Database Studio
copyright: Copyright © 2026

directories:
  output: dist-electron
  buildResources: resources

afterPack: scripts/afterPack.cjs

asar: true

files:
  - dist/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/tsconfig*"

mac:
  identity: null
  category: public.app-category.developer-tools
  darkModeSupport: true
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]

linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
