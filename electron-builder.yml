appId: com.datacon.app
productName: Database Studio
copyright: Copyright © 2026

directories:
  output: dist-electron
  buildResources: resources

afterPack: scripts/afterPack.cjs

asar: true

# 네이티브 애드온(.node)은 asar 내부에서 dlopen 불가 — better-sqlite3를 언팩한다.
# electron-builder가 .node를 자동 언팩하지만, 의도를 명시해 고정한다.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

files:
  - dist/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/tsconfig*"

mac:
  identity: null
  category: public.app-category.developer-tools
  darkModeSupport: true
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]

linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
