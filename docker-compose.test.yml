# 계약/통합 테스트용 MySQL·MariaDB·MongoDB·Redis. `docker compose -f docker-compose.test.yml up -d`.
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: datacon_test
    ports:
      - '3306:3306'
    # MySQL 8.4+ defaults to caching_sha2_password; the old --default-authentication-plugin
    # flag was removed in 8.4, so we rely on the default.
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: datacon_test
    ports:
      - '3307:3306'
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
  redis:
    image: redis:7
    ports:
      - '6379:6379'
